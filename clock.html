<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .clock {
            font-size: 2em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div class="clock" id="clock"></div>
    <script>
        function updateClock() {
            const options = {timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit'};
            const timeStringUTC = new Intl.DateTimeFormat('en-US', options).format(new Date());

            const timeZones = [
                {name: 'UTC-5', offset: -5},
                {name: 'UTC-4', offset: -4},
                {name: 'UTC', offset: 0},
                {name: 'UTC+1', offset: 1},
                {name: 'UTC+2', offset: 2},
                {name: 'UTC+3', offset: 3}
            ];

            let timeDisplay = '<strong>Current Time (UTC): </strong>' + timeStringUTC;
            timeZones.forEach(zone => {
                const localTime = new Date(new Date().getTime() + zone.offset * 3600 * 1000);
                const localTimeString = new Intl.DateTimeFormat('en-US', options).format(localTime);
                timeDisplay += `<br><strong>${zone.name}: </strong>${localTimeString}`;
            });
            document.getElementById('clock').innerHTML = timeDisplay;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

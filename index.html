<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calao NHS Registration</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eef2f7;
}

/* HEADER */
header {
  background:#123f73;
  color:white;
  padding:20px;
  text-align:center;
}

.logo {
  width:100px;
}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
}

.hero h2 {
  font-size:40px;
}

/* FORM LAYOUT */
.container {
  max-width:1100px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* BUTTON */
.submit-btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  background:#9ca3af;
  color:white;
  cursor:not-allowed;
  transition:0.3s;
}

.submit-btn.active {
  background:#184ea8;
  cursor:pointer;
}

.submit-btn.active:hover {
  background:#123f73;
}

/* LIVE PANEL */
.live {
  background:#f5f5f5;
  padding:20px;
  border-radius:15px;
}

.saved-item {
  padding:8px;
  border-bottom:1px solid #ddd;
}

/* MOBILE */
@media(max-width:768px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>Calao National High School</h1>
  <p>Registration Form</p>
</header>

<div class="hero">
  <h2>Membership Registration Now Open</h2>
</div>

<div class="container">

<div class="grid">

<!-- FORM -->
<div>
<form id="registrationForm">

<input name="lrn" id="lrn" placeholder="LRN" required>
<input name="name" id="name" placeholder="Learner Name" required>
<input name="age" id="age" placeholder="Age" required>
<input name="address" id="address" placeholder="Address" required>
<input name="guardian" id="guardian" placeholder="Guardian Info" required>
<input name="school" id="school" placeholder="Schooling Details" required>

<button type="submit" id="submitBtn" class="submit-btn" disabled>Register</button>

<p id="status"></p>

</form>
</div>

<!-- LIVE PANEL -->
<div class="live">
<h3>Live Preview</h3>

<p>Name: <span id="live-name"></span></p>
<p>LRN: <span id="live-lrn"></span></p>
<p>Age: <span id="live-age"></span></p>
<p>Address: <span id="live-address"></span></p>
<p>Guardian: <span id="live-guardian"></span></p>

<h4>Saved</h4>
<div id="saved"></div>

</div>

</div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbynHa16-UpECuS2Pf6R78_X9qCRjifMJAd4UR63n-itTufTYlSqWFN9_Ea-krJ9ysfLBg/exec";

const form = document.getElementById('registrationForm');
const submitBtn = document.getElementById('submitBtn');
const status = document.getElementById('status');

const lrn = document.getElementById('lrn');
const nameInput = document.getElementById('name');
const age = document.getElementById('age');
const address = document.getElementById('address');
const guardian = document.getElementById('guardian');
const school = document.getElementById('school');

const liveName = document.getElementById('live-name');
const liveLrn = document.getElementById('live-lrn');
const liveAge = document.getElementById('live-age');
const liveAddress = document.getElementById('live-address');
const liveGuardian = document.getElementById('live-guardian');

const saved = document.getElementById('saved');

let list = JSON.parse(localStorage.getItem('list')) || [];

/* LIVE PREVIEW */
function updateLive(){
  liveName.textContent = nameInput.value;
  liveLrn.textContent = lrn.value;
  liveAge.textContent = age.value;
  liveAddress.textContent = address.value;
  liveGuardian.textContent = guardian.value;
}

/* ENABLE BUTTON */
function checkForm(){
  if(lrn.value && nameInput.value && age.value && address.value && guardian.value && school.value){
    submitBtn.disabled = false;
    submitBtn.classList.add("active");
  } else {
    submitBtn.disabled = true;
    submitBtn.classList.remove("active");
  }
}

form.addEventListener('input', ()=>{
  updateLive();
  checkForm();
});

/* SUBMIT */
form.addEventListener('submit', async (e)=>{
  e.preventDefault();

  const formData = new FormData(form);

  try{
    await fetch(scriptURL,{
      method:'POST',
      body:formData
    });

    list.push({
      name: nameInput.value,
      lrn: lrn.value
    });

    localStorage.setItem('list', JSON.stringify(list));
    display();

    form.reset();
    updateLive();
    checkForm();

    status.innerText = "Submitted successfully!";
    status.style.color = "green";

  }catch(err){
    status.innerText = "Error submitting!";
    status.style.color = "red";
  }
});

/* DISPLAY SAVED */
function display(){
  saved.innerHTML='';
  list.forEach(r=>{
    let div = document.createElement('div');
    div.className = 'saved-item';
    div.innerText = r.name + " - " + r.lrn;
    saved.appendChild(div);
  });
}

display();
checkForm();
updateLive();
</script>

</body>
</html>

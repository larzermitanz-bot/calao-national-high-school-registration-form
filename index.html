<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calao National High School Registration Form</title>
  <style>
    :root {
      --navy: #0b355d;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #5b6472;
      --line: #d8dee8;
      --button: #8ea6bb;
      --badge: #e9ddbc;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.08), 0 8px 24px rgba(15, 23, 42, 0.05);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .topbar {
      background: var(--navy);
      color: #fff;
      padding: 34px 20px 42px;
    }
    .topbar-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .seal {
      width: 140px;
      display: flex;
      justify-content: center;
    }
    .seal img {
      width: 140px;
    }
    .brand h1 {
      margin: 0;
      font-size: 66px;
      font-weight: 800;
    }
    .brand p {
      margin: 8px 0 0;
      font-size: 31px;
    }
    .wrap { max-width: 1080px; margin: auto; padding: 20px;}
  </style>
</head>
<body>
<header class="topbar">
<div class="topbar-inner">
<div class="seal">
<img src="230617977_109992421301540_6067586315127765631_n-removebg-preview.png">
</div>
<div class="brand">
<h1>Calao National High School</h1>
<p>Registration Form</p>
</div>
</div>
</header>

<div class="wrap">
<h2>Form Ready ✔</h2>
<p>This is your working form package.</p>
</div>

</body>
</html>

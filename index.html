<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calao NHS Registration</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
    background: linear-gradient(to right,#0d47a1,#1976d2);
    color:white;
    text-align:center;
    padding:20px;
}

.logo {
    width:90px;
    display:block;
    margin:auto;
}

.container { display:flex; }

.form-section { flex:1; padding:20px; }

.live-panel {
    flex:1;
    padding:20px;
    border-left:2px solid #ccc;
    background:white;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button {
    background:#0d47a1;
    color:white;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover { background:#1565c0; }

.saved-item {
    padding:8px;
    border-bottom:1px solid #ddd;
}

@media(max-width:768px){
    .container{ flex-direction:column; }
    .live-panel{ border-left:none; border-top:2px solid #ccc; }
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h1>Calao National High School</h1>
    <h3>Student Registration Form</h3>
</header>

<div class="container">

<div class="form-section">
<form id="registration-form">

<label>LRN:</label>
<input name="lrn" id="lrn" required>

<label>Learner Name:</label>
<input name="name" id="name" required>

<label>Age:</label>
<input name="age" id="age" required>

<label>Address:</label>
<input name="address" id="address" required>

<label>Guardian Info:</label>
<input name="guardian" id="guardian" required>

<label>Schooling Details:</label>
<input name="school" id="school" required>

<button type="submit">Register</button>

<p id="status"></p>

</form>
</div>

<div class="live-panel">

<h2>LIVE Panel</h2>

<p><b>Name:</b> <span id="live-name"></span></p>
<p><b>LRN:</b> <span id="live-lrn"></span></p>
<p><b>Age:</b> <span id="live-age"></span></p>
<p><b>Address:</b> <span id="live-address"></span></p>
<p><b>Guardian:</b> <span id="live-guardian"></span></p>

<h3>Saved Registrations</h3>
<div id="saved"></div>

</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbynHa16-UpECuS2Pf6R78_X9qCRjifMJAd4UR63n-itTufTYlSqWFN9_Ea-krJ9ysfLBg/exec";

const form = document.getElementById('registration-form');
const status = document.getElementById('status');

const lrn = document.getElementById('lrn');
const name = document.getElementById('name');
const age = document.getElementById('age');
const address = document.getElementById('address');
const guardian = document.getElementById('guardian');

const liveName = document.getElementById('live-name');
const liveLrn = document.getElementById('live-lrn');
const liveAge = document.getElementById('live-age');
const liveAddress = document.getElementById('live-address');
const liveGuardian = document.getElementById('live-guardian');

const saved = document.getElementById('saved');

let dataList = JSON.parse(localStorage.getItem('dataList')) || [];

function updateLive(){
    liveName.textContent = name.value;
    liveLrn.textContent = lrn.value;
    liveAge.textContent = age.value;
    liveAddress.textContent = address.value;
    liveGuardian.textContent = guardian.value;
}

form.addEventListener('input', updateLive);

form.addEventListener('submit', async (e)=>{
    e.preventDefault();

    let formData = new FormData(form);

    try{
        await fetch(scriptURL,{
            method:'POST',
            body: formData
        });

        let record = {
            name: name.value,
            lrn: lrn.value
        };

        dataList.push(record);
        localStorage.setItem('dataList', JSON.stringify(dataList));

        display();

        form.reset();
        updateLive();

        status.innerText = "Submitted successfully!";
        status.style.color = "green";

    }catch(err){
        status.innerText = "Submission failed!";
        status.style.color = "red";
    }
});

function display(){
    saved.innerHTML = '';
    dataList.forEach(d=>{
        let div = document.createElement('div');
        div.className = 'saved-item';
        div.innerText = d.name + " - " + d.lrn;
        saved.appendChild(div);
    });
}

display();
updateLive();

</script>

</body>
</html>
